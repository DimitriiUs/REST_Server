services:
  go-app:
    container_name: golang_app_container
    build:
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      DATABASE_HOST: ${DB_HOST}
      DATABASE_PORT: ${DB_PORT}
    depends_on:
      - go_db
    ports:
      - "3030:8080"

  go_db:
    container_name: go_db
    image: postgres:latest
    restart: always
    ports:
      - ${DB_PORT}:5432
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      DATABASE_HOST: ${DB_HOST}

    volumes:
      - ./scripts/tasks_script_init.sql:/docker-entrypoint-initdb.d/init.sql
